apiVersion: v1
kind: Service
metadata:
  name: validation-service
  namespace: weather
  labels:
    app: validation-service
spec:
  # Internal only: reached by weather-api via http://validation-service:8081
  # (cluster DNS within namespace weather). No NodePort needed.
  type: ClusterIP
  selector:
    app: validation-service
  ports:
    - name: http
      port: 8081
      targetPort: http
