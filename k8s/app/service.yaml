apiVersion: v1
kind: Service
metadata:
  name: weather-api
  namespace: weather
  labels:
    app: weather-api
spec:
  type: NodePort
  selector:
    app: weather-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      # Docker Desktop (legacy) forwarded NodePort to localhost:30080.
      # desktop-control-plane / kind clusters: use scripts/k8s-port-forward.sh from Jenkins.
      nodePort: 30080
