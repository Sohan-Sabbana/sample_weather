apiVersion: v1
kind: Service
metadata:
  name: weather-api
  namespace: weather
  labels:
    app: weather-api
spec:
  type: NodePort
  selector:
    app: weather-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      # Docker Desktop forwards NodePort to localhost, so tests can hit
      # http://localhost:30080 (or http://host.docker.internal:30080 from
      # inside a container).
      nodePort: 30080
