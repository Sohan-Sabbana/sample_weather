apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: weather
  labels:
    app: weather-api
spec:
  # In-memory stores are not shared across pods; use 1 replica for CI/regression tests.
  replicas: 1
  selector:
    matchLabels:
      app: weather-api
  template:
    metadata:
      labels:
        app: weather-api
        # Fluent Bit DaemonSet (k8s/logging/fluent-bit.yaml) tails pods in namespace weather.
      annotations:
        co.elastic.logs/enabled: "true"
        fluentbit.io/exclude: "false"
    spec:
      containers:
        - name: weather-api
          # IMAGE_PLACEHOLDER is rewritten by the Jenkins pipeline using sed.
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: ENV
              value: "ci"
            - name: BUILD_NUMBER
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['build']
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
