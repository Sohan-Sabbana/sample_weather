---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: logging
roleRef:
  kind: ClusterRole
  name: fluent-bit
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  /fluent-bit/etc/parsers.conf

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/*_logging_*.log,/var/log/containers/*_kube-system_*.log
        Parser            cri
        DB                /var/lib/fluent-bit/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Labels              On
        Annotations         On

    [FILTER]
        Name          parser
        Match         kube.*
        Key_Name      log
        Parser        weather_json
        Reserve_Data  On
        Preserve_Key  On

    [FILTER]
        Name    grep
        Match   kube.*
        Regex   $kubernetes['namespace_name'] weather

    [FILTER]
        Name    grep
        Match   kube.*
        Exclude $kubernetes['namespace_name'] logging

    [FILTER]
        Name    record_modifier
        Match   kube.*
        Record  source pod
        Record  log_type app

    # LogstashEncoder uses "message"; Kibana/ECS often expect "log". Keep_Log Off drops raw log.
    [FILTER]
        Name      modify
        Match     kube.*
        Condition Key_exists message
        Copy      message log

    [OUTPUT]
        Name            es
        Match           kube.*
        Host            ${ES_HOST}
        Port            ${ES_PORT}
        Logstash_Format On
        Logstash_Prefix weather-logs
        Suppress_Type_Name On
        Replace_Dots    On
        Retry_Limit     False
        tls             Off

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On

    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On

    [PARSER]
        Name        weather_json
        Format      json
        Time_Key    @timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      terminationGracePeriodSeconds: 30
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.2.4
          ports:
            - name: metrics
              containerPort: 2020
          env:
            # Ship pod logs to the SAME Elasticsearch the Jenkins pipeline, the CD
            # log analyzer, and Kibana use (Docker Desktop ES on the host). This
            # keeps pod + test + CD logs in one cluster so they correlate by
            # build/traceId. The DaemonSet runs with hostNetwork, so
            # host.docker.internal resolves to the host. To use the in-cluster ES
            # instead, set ES_HOST=elasticsearch.logging.svc.cluster.local.
            - name: ES_HOST
              value: host.docker.internal
            - name: ES_PORT
              value: "9200"
          resources:
            limits:
              memory: 200Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: flb-storage
              mountPath: /var/lib/fluent-bit
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: flb-storage
          hostPath:
            path: /var/lib/fluent-bit
            type: DirectoryOrCreate
