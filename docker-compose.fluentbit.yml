# Elasticsearch + Kibana + Fluent Bit (Jenkins CD + test logs).
# Use when Jenkins runs in Docker and you want logs in ES without the bulk-upload script.
#
#   docker compose -f docker-compose.fluentbit.yml up -d
#
# Point Fluent Bit at your Jenkins home (same path as scripts/jenkins/run-jenkins.ps1):
#   $env:JENKINS_HOME = "$HOME\jenkins_home"
#   docker compose -f docker-compose.fluentbit.yml up -d

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=weather-logs
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 60
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - logging

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_PUBLICBASEURL=http://localhost:5601
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - logging

  fluent-bit:
    image: fluent/fluent-bit:3.2.4
    container_name: fluent-bit-jenkins
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_HOST=elasticsearch
      - ES_PORT=9200
    volumes:
      - ./config/fluent-bit/fluent-bit-jenkins.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./config/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./config/fluent-bit/extract-jenkins-build.lua:/fluent-bit/etc/extract-jenkins-build.lua:ro
      # Mount the SAME jenkins_home volume your Jenkins container uses (read-only)
      - ${JENKINS_HOME:-${HOME}/jenkins_home}:/var/jenkins_home:ro
    networks:
      - logging

volumes:
  es-data:

networks:
  logging:
    name: weather-logging
