spring:
  application:
    name: weather-api

server:
  port: ${SERVER_PORT:8080}

app:
  version: @project.version@

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example.weather: INFO

# Where to write the JSON log file that Filebeat / Logstash will ship to Elasticsearch
log:
  file:
    path: ${LOG_DIR:./logs}
    name: weather-api.json
