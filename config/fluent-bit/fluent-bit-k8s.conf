# Fluent Bit — Kubernetes DaemonSet: ships weather-api pod stdout to Elasticsearch.
# Deploy with: kubectl apply -f k8s/logging/fluent-bit.yaml

[SERVICE]
    Flush         5
        Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# Container logs (Docker Desktop / containerd CRI path on the node)
[INPUT]
    Name              tail
    Tag               kube.*
    Path              /var/log/containers/*.log
    Exclude_Path      /var/log/containers/*_logging_*.log,/var/log/containers/*_kube-system_*.log
    Parser            cri
    DB                /var/lib/fluent-bit/flb_kube.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  10

[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kube.var.log.containers.
    Merge_Log           On
    Keep_Log            Off
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off
    Labels              On
    Annotations         On

# Parse JSON written by weather-api (logback LogstashEncoder on stdout)
[FILTER]
    Name          parser
    Match         kube.*
    Key_Name      log
    Parser        weather_json
    Reserve_Data  On
    Preserve_Key  On

# Only ship application pods in the weather namespace
[FILTER]
    Name    grep
    Match   kube.*
    Regex   $kubernetes['namespace_name'] weather

# Drop fluent-bit / logging stack noise if any leaks through
[FILTER]
    Name    grep
    Match   kube.*
    Exclude $kubernetes['namespace_name'] logging

[FILTER]
    Name    record_modifier
    Match   kube.*
    Record  source pod
    Record  log_type app

[FILTER]
    Name      modify
    Match     kube.*
    Condition Key_exists message
    Copy      message log

[OUTPUT]
    Name            es
    Match           kube.*
    Host            ${ES_HOST}
    Port            ${ES_PORT}
    Logstash_Format On
    Logstash_Prefix weather-logs
    Suppress_Type_Name On
    Replace_Dots    On
    Retry_Limit     False
    tls             Off
