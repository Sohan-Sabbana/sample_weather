# Fluent Bit — Docker sidecar/host agent for Jenkins CD + test analytics logs.
# Mount the same jenkins_home volume Jenkins uses (read-only is fine).
# ES on Docker Desktop: host.docker.internal:9200

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# Jenkins pipeline console output (per-build log files)
[INPUT]
    Name              tail
    Tag               cd.jenkins
    Path              /var/jenkins_home/jobs/*/builds/*/log
    Path_Key          jenkins_build_log
    Parser            jenkins_console
    DB                /var/log/flb_jenkins_cd.db
    Mem_Buf_Limit     20MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# Test JVM JSON (MAT / regression) written under workspace/logs/
[INPUT]
    Name              tail
    Tag               test.jvm
    Path              /var/jenkins_home/workspace/*/logs/tests-*.json
    Parser            json
    Path_Key          test_log_file
    DB                /var/log/flb_jenkins_test.db
    Mem_Buf_Limit     20MB
    Skip_Long_Lines   On
    Refresh_Interval  5

[INPUT]
    Name              tail
    Tag               test.jvm
    Path              /var/jenkins_home/workspace/*/logs/flows/*.log
    Parser            json
    Path_Key          test_log_file
    DB                /var/log/flb_jenkins_flows.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  5

[FILTER]
    Name    record_modifier
    Match   cd.*
    Record  source jenkins
    Record  log_type cd

[FILTER]
    Name    record_modifier
    Match   test.*
    Record  source tests
    Record  log_type test

# Extract build number from path when possible: .../jobs/<job>/builds/<n>/log
[FILTER]
    Name    lua
    Match   cd.*
    script  /fluent-bit/etc/extract-jenkins-build.lua
    call    add_build_fields

[OUTPUT]
    Name            es
    Match           cd.*
    Host            ${ES_HOST}
    Port            ${ES_PORT}
    Logstash_Format On
    Logstash_Prefix weather-logs-cd
    Suppress_Type_Name On
    Replace_Dots    On
    Retry_Limit     False
    tls             Off

[OUTPUT]
    Name            es
    Match           test.*
    Host            ${ES_HOST}
    Port            ${ES_PORT}
    Logstash_Format On
    Logstash_Prefix weather-logs-test
    Suppress_Type_Name On
    Replace_Dots    On
    Retry_Limit     False
    tls             Off
