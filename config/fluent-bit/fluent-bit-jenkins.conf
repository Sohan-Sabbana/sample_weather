# Fluent Bit — Docker sidecar/host agent for Jenkins CD + test analytics logs.
# Mount the same jenkins_home volume Jenkins uses (read-only is fine).
# ES on Docker Desktop: host.docker.internal:9200

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# Jenkins pipeline console output (per-build log files)
[INPUT]
    Name              tail
    Tag               cd.jenkins
    Path              /var/jenkins_home/jobs/*/builds/*/log
    Path_Key          jenkins_build_log
    Parser            jenkins_console
    DB                /var/log/flb_jenkins_cd.db
    Mem_Buf_Limit     20MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# Test JVM logs are intentionally NOT shipped to Elasticsearch. ES is the store
# for POD/container logs only; test JVM logs remain as local Jenkins artifacts
# (flow execution report + per-test flow logs) and feed the analyzer's workspace
# collector directly. The analyzer correlates a failed test to its pod logs by
# testName (+ build), not by shipping test logs into ES.

[FILTER]
    Name    record_modifier
    Match   cd.*
    Record  source jenkins
    Record  log_type cd

# Extract build number from path when possible: .../jobs/<job>/builds/<n>/log
[FILTER]
    Name    lua
    Match   cd.*
    script  /fluent-bit/etc/extract-jenkins-build.lua
    call    add_build_fields

# Jenkins console parser writes "message"; mirror to "log" for Kibana Discover.
[FILTER]
    Name      modify
    Match     cd.*
    Condition Key_exists message
    Copy      message log

# OPTIONAL: the CD console stream below is the ONLY non-pod data in ES. For a
# strictly pod-logs-only Elasticsearch, comment out this [OUTPUT] (and the
# cd.jenkins [INPUT] above). The analyzer does not need it - it reads the Jenkins
# console from the local build `log` file / Jenkins API, not from ES.
[OUTPUT]
    Name            es
    Match           cd.*
    Host            ${ES_HOST}
    Port            ${ES_PORT}
    Logstash_Format On
    Logstash_Prefix weather-logs-cd
    Suppress_Type_Name On
    Replace_Dots    On
    Retry_Limit     False
    tls             Off
